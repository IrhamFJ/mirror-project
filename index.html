<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MirrorAnywhere | Ultra Low Latency</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main: #00f2ff; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Menu Utama */
        #app-container { width: 90%; max-width: 450px; text-align: center; transition: 0.4s; }
        .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #00f2ff, #0062ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        
        .mode-card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; text-align: left; display: flex; align-items: center; }
        .mode-card:hover { border-color: var(--main); background: #1c1c1c; transform: scale(1.02); }
        .mode-icon { font-size: 2.5rem; margin-right: 20px; }
        .mode-info h3 { margin: 0; font-size: 1.1rem; }
        .mode-info p { margin: 5px 0 0; font-size: 0.8rem; color: #888; }

        /* Control Panel */
        #setup-panel { display: none; background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #333; width: 100%; }
        .id-badge { background: #000; padding: 12px; border-radius: 12px; font-family: 'Courier New', monospace; color: var(--main); border: 1px solid #333; margin: 20px 0; font-size: 1.2rem; cursor: pointer; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--main); }
        .btn-primary { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--main); color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3); }
        
        /* Video Fullscreen */
        #video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .close-stream { position: absolute; top: 20px; right: 20px; background: rgba(255,0,0,0.6); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; z-index: 1001; }

        .status-dot { width: 10px; height: 10px; background: #ff4b4b; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="logo">MirrorAnywhere</div>

        <div id="mode-selection">
            <div class="mode-card" onclick="startApp('hp')">
                <div class="mode-icon">📱</div>
                <div class="mode-info">
                    <h3>Mode HP ke HP</h3>
                    <p>Optimasi Low-Bandwidth & Portait.</p>
                </div>
            </div>
            <div class="mode-card" onclick="startApp('tv')">
                <div class="mode-icon">📺</div>
                <div class="mode-info">
                    <h3>Mode HP ke TV</h3>
                    <p>Fokus Kualitas HD & Wide Screen.</p>
                </div>
            </div>
            <p style="font-size: 0.7rem; color: #555;">v1.0 Stable - Powered by WebRTC P2P</p>
        </div>

        <div id="setup-panel">
            <div id="conn-status"><span class="status-dot" id="dot"></span><span id="stat-text">Connecting to Server...</span></div>
            <div class="id-badge" id="my-id" onclick="copyID()">Generating...</div>
            <p style="font-size: 0.8rem; color: #777;">Klik ID di atas untuk menyalin</p>
            
            <input type="text" id="peer-id-input" placeholder="Masukkan ID Tujuan">
            <button class="btn-primary" onclick="connectToPeer()">MULAI MIRRORING</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">← Kembali</button>
        </div>
    </div>

    <div id="video-overlay">
        <button class="close-stream" onclick="stopStream()">Stop & Exit</button>
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <script>
        let peer;
        let myId;
        let activeStream;
        let selectedMode = '';

        // Inisialisasi PeerJS
        function initPeer() {
            peer = new Peer({
                config: {'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ]}
            });

            peer.on('open', (id) => {
                myId = id;
                document.getElementById('my-id').innerText = id;
                document.getElementById('dot').classList.add('status-online');
                document.getElementById('stat-text').innerText = "Server Ready";
            });

            // Mendengar Panggilan (Sisi Penerima)
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    const video = document.getElementById('remote-video');
                    video.srcObject = stream;
                    document.getElementById('video-overlay').style.display = 'block';
                });
            });

            peer.on('error', (err) => {
                console.error(err);
                alert("Koneksi Error: " + err.type);
            });
        }

        function startApp(mode) {
            selectedMode = mode;
            document.getElementById('mode-selection').style.display = 'none';
            document.getElementById('setup-panel').style.display = 'block';
            initPeer();
        }

        async function connectToPeer() {
            const targetId = document.getElementById('peer-id-input').value;
            if (!targetId) return alert("ID tujuan wajib diisi!");

            try {
                // Konfigurasi Stream berdasarkan mode
                const constraints = {
                    video: {
                        displaySurface: "monitor",
                        frameRate: { ideal: 30, max: 60 },
                        width: (selectedMode === 'hp') ? { max: 720 } : { max: 1920 }
                    },
                    audio: true
                };

                activeStream = await navigator.mediaDevices.getDisplayMedia(constraints);
                peer.call(targetId, activeStream);
                
                alert("Sedang mengirim layar...");
            } catch (err) {
                alert("Gagal Share Screen: " + err);
            }
        }

        function stopStream() {
            if (activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
            }
            location.reload();
        }

        function copyID() {
            navigator.clipboard.writeText(myId);
            alert("ID disalin ke clipboard!");
        }
    </script>
</body>
</html>
